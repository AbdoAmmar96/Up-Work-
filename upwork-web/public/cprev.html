<!doctype html><html dir="rtl"><head><meta charset="utf-8"><style>
:root{--line:#e5e7eb;--radius:14px;--gray-50:#f7f8fa}
body{margin:0;background:#fff;padding:40px;font-family:system-ui}
.clients-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1.4rem;max-width:1100px;margin:0 auto}
.client-card{display:flex;align-items:center;justify-content:center;aspect-ratio:3/2;padding:.8rem;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(15,23,42,.06)}
.client-card__logo{max-width:100%;max-height:112px;width:auto;height:auto;object-fit:contain}
</style></head><body><div class="clients-grid" id="g"></div><script>
const n=['advocure','danone','h2o','kandilglass','koki','kandilsteel','egyptianstarch','otsuka','akhnaton','eva','ucp','farmfrites','ulker','avon','oriflame'];
document.getElementById('g').innerHTML=n.map(x=>`<div class="client-card"><img class="client-card__logo" src="/clients/${x}.png"></div>`).join('');
</script></body></html>
